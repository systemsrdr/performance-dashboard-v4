<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V4 RDR — Gestão de Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F4F6;--card:#ffffff;--gray2:#F9FAFB;
  --tx:#111827;--tx2:#4B5563;--tx3:#9CA3AF;
  --brd:#E5E7EB;--v4-red:#E8000D;--v4-dark:#111111;
  --green:#10B981;--green2:#ECFDF5;
  --blue:#2563EB;--blue2:#EFF6FF;
  --sh:0 4px 6px -1px rgba(0,0,0,0.05);
  --r:14px;--rs:8px
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px}
body{min-height:100vh}

#app-ui, #nf { display: none; }
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid var(--v4-red);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.nav{background:var(--card);border-bottom:1px solid var(--brd);height:60px;display:flex;align-items:center;padding:0 28px;gap:14px;position:sticky;top:0;z-index:100}
.nav-logo-mark{width:30px;height:30px;background:var(--v4-red);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
.nav-brand{font-size:16px;font-weight:800;color:var(--v4-dark)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.qbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--brd);background:#fff;font-size:12px;font-weight:600;cursor:pointer}
.qbtn.on{background:var(--v4-dark);color:#fff}

.sidebar{position:fixed;top:60px;left:0;width:220px;height:calc(100vh - 60px);background:var(--v4-dark);padding:20px 14px;display:flex;flex-direction:column;gap:5px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--rs);font-size:13px;color:#aaa;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:0.2s}
.sb-btn:hover{background:rgba(255,255,255,0.05);color:#fff}
.sb-btn.on{background:var(--v4-red);color:#fff;font-weight:700}

.main{margin-left:220px;margin-top:60px;padding:30px 40px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border-top:4px solid var(--v4-red)}
.kpi-label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:800;color:var(--v4-dark);letter-spacing:-1px}

.gauge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.gauge-card{background:var(--card);border-radius:var(--r);padding:20px;text-align:center;box-shadow:var(--sh)}
.gauge-wrap{height:100px;position:relative}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:24px;overflow:hidden}
.card-hd{padding:16px 20px;border-bottom:1px solid var(--brd);font-weight:700}

@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.kpi-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <p style="margin-top:15px; font-weight:600">Sincronizando Financeiro e Mídia...</p>
</div>

<div id="nf" style="padding:100px; text-align:center">
    <h1>404</h1>
    <p>Projeto não identificado.</p>
</div>

<div id="app-ui">
  <nav class="nav">
    <div class="nav-logo-mark">4</div>
    <span class="nav-brand">V4 RDR</span>
    <span id="nav-client" style="font-weight:600; color:var(--tx2); margin-left:10px"></span>
    <div class="nav-right">
      <button class="qbtn on" onclick="setQ('30d',this)">Últimos 30 dias</button>
      <button class="qbtn" onclick="setQ('7d',this)">7 dias</button>
    </div>
  </nav>

  <nav class="sidebar">
    <button class="sb-btn on" onclick="showSec('overview',this)">Visão Geral</button>
